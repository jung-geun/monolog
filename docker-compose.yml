version: '3.8'

services:
  blog:
    image: ghcr.io/jung-geun/monolog:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: blog
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NOTION_TOKEN=COPY_YOUR_NOTION_TOKEN_HERE
      - NOTION_DATASOURCE_ID=COPY_YOUR_NOTION_DATASOURCE_ID_HERE
      - NEXT_PUBLIC_GOOGLE_MEASUREMENT_ID=COPY_YOUR_GOOGLE_MEASUREMENT_ID_HERE
      - REVALIDATE_HOURS=1
      - TOKEN_FOR_REVALIDATE=GENERATE_RANDOM_STRING_AND_PUT_HERE
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - logs-data:/app/logs
      - image-cache:/app/.image-cache
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: blog-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  logs-data:
  image-cache:
  redis-data:
