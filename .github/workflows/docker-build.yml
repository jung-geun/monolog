name: Docker Build and Push

on:
  push:
    branches:
      - dev
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - dev

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Determine image tags
        id: tags
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          REF: ${{ github.ref }}
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          if [ "$REF_TYPE" = "tag" ]; then
            VERSION="${REF_NAME#v}"
            echo "value=${IMAGE}:${VERSION},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          elif [ "$REF" = "refs/heads/dev" ]; then
            echo "value=${IMAGE}:dev" >> "$GITHUB_OUTPUT"
          else
            echo "value=${IMAGE}:pr-test" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract OCI labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Keep runner temp alive during build
        run: |
          (while true; do
            find "$RUNNER_TEMP" -maxdepth 4 -exec touch {} + 2>/dev/null || true
            sleep 15
          done) &
          echo "KEEPALIVE_PID=$!" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.value }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/jung-geun/monolog:buildcache
          cache-to: ${{ github.event_name != 'pull_request' && 'type=registry,ref=ghcr.io/jung-geun/monolog:buildcache,mode=max' || '' }}
          platforms: linux/amd64

      - name: Stop temp keepalive
        if: always()
        run: kill "$KEEPALIVE_PID" 2>/dev/null || true

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: false

      - name: Output image tags
        if: github.event_name != 'pull_request'
        run: echo "Pushed tags ${{ steps.tags.outputs.value }}"
