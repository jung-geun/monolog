name: Revalidate site pages

on:
  schedule:
    # Runs at 01:00 UTC every 3rd day of the week (Sun/Wed/Sat)
    - cron: "0 1 * * 0/3"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  revalidate:
    name: Call revalidate endpoint
    runs-on: ubuntu-latest

    steps:
      - name: Call /api/revalidate
        env:
          REVALIDATE_URL: ${{ secrets.REVALIDATE_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          set -euo pipefail

          if [ -z "${REVALIDATE_URL:-}" ] || [ -z "${REVALIDATE_SECRET:-}" ]; then
            echo "ERROR: secrets REVALIDATE_URL and REVALIDATE_SECRET are required"
            echo "  REVALIDATE_URL  — site base URL, e.g. https://your-site.com"
            echo "  REVALIDATE_SECRET — must match TOKEN_FOR_REVALIDATE in the container"
            exit 1
          fi

          ENDPOINT="${REVALIDATE_URL%/}/api/revalidate"
          echo "Calling: $ENDPOINT"

          http_code=$(curl -sS --max-time 30 -o /tmp/resp.json \
            -w "%{http_code}" \
            -H "Authorization: Bearer ${REVALIDATE_SECRET}" \
            "$ENDPOINT") || true

          echo "HTTP $http_code"
          cat /tmp/resp.json || true
          echo

          if [ "$http_code" != "200" ]; then
            echo "Revalidate failed (HTTP $http_code)"
            if [ -n "${DISCORD_WEBHOOK:-}" ]; then
              curl -sS -X POST -H 'Content-type: application/json' \
                --data "{\"content\":\"Revalidate failed (HTTP $http_code) — $ENDPOINT\"}" \
                "$DISCORD_WEBHOOK" || true
            fi
            exit 1
          fi

          echo "Revalidate triggered — background job running on server"
          if [ -n "${DISCORD_WEBHOOK:-}" ]; then
            curl -sS -X POST -H 'Content-type: application/json' \
              --data "{\"content\":\"Revalidate triggered for ${REVALIDATE_URL}\"}" \
              "$DISCORD_WEBHOOK" || true
          fi
